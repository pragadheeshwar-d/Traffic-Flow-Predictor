<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>{{ title or "Traffic Flow Predictor" }}</title>
    <meta name="description" content="Traffic Flow Predictor and Route Optimizer Using Python Flask" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
  </head>
  <body data-page="{{ active_page }}">
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-top"><span class="pulse"></span><span>Traffic Intel</span></div>
          <h1>Coimbatore<br><span>Traffic Monitor</span></h1>
        </div>
        <nav class="nav">
          <a href="{{ url_for('index') }}" class="{% if active_page == 'home' %}active{% endif %}"><span class="icon">⬡</span><span>Live Network</span></a>
          <a href="{{ url_for('routing_page') }}" class="{% if active_page == 'routing' %}active{% endif %}"><span class="icon">⇌</span><span>Route Planner</span></a>
          <a href="{{ url_for('incidents_page') }}" class="{% if active_page == 'incidents' %}active{% endif %}"><span class="icon">⚠</span><span>Incidents</span></a>
          <a href="{{ url_for('predictions_page') }}" class="{% if active_page == 'predictions' %}active{% endif %}"><span class="icon">◈</span><span>Predictions</span></a>
          <a href="{{ url_for('analytics_page') }}" class="{% if active_page == 'analytics' %}active{% endif %}"><span class="icon">▦</span><span>Analytics</span></a>
        </nav>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
