{% extends "base.html" %}
{% block content %}
<section class="page" data-view="home">
  <div class="topbar">
    <div>
      <h2 class="main-title">Traffic Network</h2>
      <div class="main-subtitle">Real-time monitoring - Coimbatore road network</div>
    </div>
    <div class="refresh"><span class="pulse" style="width:7px;height:7px"></span>Auto-refreshing every 30s</div>
  </div>

  <div class="grid kpi-grid" id="home-kpis"></div>

  <div class="grid two-col">
    <div class="card pad">
      <div class="section-title">Live Network View</div>
      <div class="map" id="home-map" data-map="network" data-incidents="active"></div>
      <div style="margin-top:12px" class="legend">
        <span><i class="swatch" style="background:#22c55e"></i>Free (&lt;40%)</span>
        <span><i class="swatch" style="background:#f59e0b"></i>Moderate (40-65%)</span>
        <span><i class="swatch" style="background:#ef4444"></i>Heavy (&gt;65%)</span>
        <span><i class="swatch" style="background:#ef4444"></i>Incident</span>
      </div>
    </div>
    <div class="grid">
      <div class="card pad">
        <div class="section-title">Active Incidents</div>
        <div class="list" id="home-incidents"></div>
      </div>
      <div class="card pad">
        <div class="section-title">Most Congested Segments</div>
        <div class="list" id="home-traffic"></div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
